<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Virtual Classroom</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            background: #111111; 
            overflow: hidden; 
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        #meetingSDKElement { 
            width: 100%; 
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: #111;
        }
        #loader {
            position: fixed;
            inset: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.4s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p { color: #888; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; }
        
        #error-box {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            padding: 40px;
            text-align: center;
        }
        #error-box strong { color: #f87171; font-size: 18px; margin-bottom: 12px; }
        #error-msg { color: #666; font-size: 14px; max-width: 400px; line-height: 1.6; }

        /* Hide Zoom's redundant built-in header/icons to avoid overlap with parent header */
        .zmmtg-root [class*="zm-header"],
        .zmmtg-root [class*="meeting-info"],
        .zmmtg-root [class*="security-icon"],
        .zmmtg-root [class*="view-options"] {
            display: none !important;
        }

        /* Minimal Zoom root styling to ensure it fills the container */
        .zmmtg-root { width: 100% !important; height: 100% !important; background: transparent !important; }
    </style>
</head>
<body>
    <div id="meetingSDKElement"></div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status-msg">Preparing Your Environment...</p>
    </div>

    <div id="error-box">
        <strong>Meeting Connection Failed</strong>
        <p id="error-msg"></p>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="./zoom-sdk.js"></script>

    <script>
        const statusMsg = document.getElementById('status-msg');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');

        function setStatus(msg) {
            if (statusMsg) statusMsg.textContent = msg;
            window.parent.postMessage({ type: 'ZOOM_LOG', message: msg }, '*');
        }

        function showError(msg) {
            if (loader) loader.style.display = 'none';
            if (errorBox) errorBox.style.display = 'flex';
            if (errorMsg) errorMsg.textContent = msg;
            window.parent.postMessage({ type: 'ZOOM_ERROR', message: msg }, '*');
        }

        async function startMeeting(config) {
            if (window.__isJoining) return;
            window.__isJoining = true;

            try {
                const ZoomSDK = window.ReactWidgets || window.ZoomMtgEmbedded;
                if (!ZoomSDK) throw new Error("Zoom SDK failed to load properly.");

                if (!window.__zoomClient) {
                    setStatus('Initializing Zoom Client...');
                    window.__zoomClient = ZoomSDK.createClient();
                    
                    await window.__zoomClient.init({
                        zoomAppRoot: document.getElementById('meetingSDKElement'),
                        language: 'en-US',
                        patchJsMedia: true,
                        leaveUrl: config.leaveUrl || window.location.origin,
                        sdkKey: config.sdkKey,
                        customize: {
                            video: {
                                isHeaderHide: true,
                                isResizable: true,
                                viewSizes: {
                                    default: {
                                        width: window.innerWidth,
                                        height: window.innerHeight
                                    }
                                }
                            }
                        }
                    });
                } else {
                    try { await window.__zoomClient.leave(); } catch(e) {}
                }

                setStatus('Joining Meeting Room...');
                await window.__zoomClient.join({
                    signature: config.signature,
                    sdkKey: config.sdkKey,
                    meetingNumber: config.meetingNumber.toString(),
                    userName: config.userName || 'Class Participant',
                    userEmail: config.userEmail || '',
                    password: config.password
                }).catch(err => {
                    // Ignore duplicate join error as it means we're already in
                    if (err.errorCode === 5012 || err.type === 'INVALID_OPERATION') return;
                    throw err;
                });

                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 400);
                }
                window.parent.postMessage({ type: 'ZOOM_JOINED' }, '*');

            } catch (err) {
                console.error('[Zoom] Start Error:', err);
                showError(err.message || "Failed to initialize the meeting.");
            } finally {
                window.__isJoining = false;
            }
        }

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'ZOOM_START') {
                startMeeting(event.data.config);
            }
        });

        window.parent.postMessage({ type: 'ZOOM_FRAME_READY' }, '*');
    </script>
</body>
</html>
