name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "Client/**" # Only run when files in the Client folder change

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t 640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-client:latest \
            --push \
            ./Client

      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to ECR on the server
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 640465964259.dkr.ecr.ap-south-1.amazonaws.com
            
            # Pull and Restart container
            docker pull 640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-client:latest
            docker stop adhyayan-client-container || true
            docker rm adhyayan-client-container || true
            docker run -d -p 3000:3000 \
              --restart unless-stopped \
              --name adhyayan-client-container \
              640465964259.dkr.ecr.ap-south-1.amazonaws.com/adhyayan-client:latest
